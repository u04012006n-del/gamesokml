<button onclick="openPUBG()">game sok ml ha</button>

<script>
function openPUBG() {
  const intentLink = "intent://#Intent;scheme=pubgmobile;package=com.tencent.ig;end";

  window.location.href = intentLink;

  setTimeout(() => {
    window.location.href =
      "https://play.google.com/store/apps/details?id=com.tencent.ig";
  }, 1500);
}
</script>
